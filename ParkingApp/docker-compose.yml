services:
  kong:
    image: kong:3.6
    container_name: parking-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./App/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"

  postgres:
    image: postgres:16
    container_name: parking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro

  mysql-zonas:
    image: mysql:8
    container_name: parking-mysql-zonas
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zonas_espacios
      MYSQL_ROOT_PASSWORD: "123"
    ports:
      - "3306:3306"
    volumes:
      - mysql_zonas_data:/var/lib/mysql

volumes:
  postgres_data:
  mysql_zonas_data:
