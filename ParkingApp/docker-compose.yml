name: parkingapp

services:
  kong:
    image: kong:3.6
    container_name: parking-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./App/kong.yml:/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - usuarios
      - zonas-espacios
      - vehiculos
      - tickets

  postgres:
    image: postgres:16
    container_name: parking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-zonas:
    image: mysql:8
    container_name: parking-mysql-zonas
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zonas_espacios
      MYSQL_ROOT_PASSWORD: "123"
    ports:
      - "3306:3306"
    volumes:
      - mysql_zonas_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p123"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: parking-rabbitmq
    # Hostname fijo: RabbitMQ guarda sus datos bajo rabbit@<hostname>; si cambia
    # en cada recreación, el arranque falla con timeout_waiting_for_khepri_projections
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: parking-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  usuarios:
    build: ./App/ms-usuarios-roles-auth/usuarios
    container_name: parking-usuarios
    restart: unless-stopped
    environment:
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://postgres:5432/usuarios_db
      DB_USERNAME: postgres
      DB_PASSWORD: "123"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  zonas-espacios:
    build: ./App/ms-zonas-espacios/zonas-espacios
    container_name: parking-zonas-espacios
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-zonas:3306/zonas_espacios?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: "123"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      mysql-zonas:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  vehiculos:
    build: ./App/ms-vehiculos
    container_name: parking-vehiculos
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USUARIO: postgres
      DB_CONTRASENA: "123"
      DB_NOMBRE: vehiculos_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_EXCHANGE: exchange_audit
      RABBITMQ_ROUTING_KEY: routing_audit
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  tickets:
    build: ./App/ms-tickets
    container_name: parking-tickets
    restart: unless-stopped
    environment:
      PORT: "3002"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: "123"
      DB_NAME: tickets_db
      AUTH_TOKEN_URL: http://usuarios:8080/api/oauth/token
      SERVICE_USERNAME: service
      SERVICE_PASSWORD: service123
      MS_PERSONA: http://usuarios:8080/api/personas
      MS_ZONAS: http://zonas-espacios:8081/api/zonas
      MS_ESPACIOS: http://zonas-espacios:8081/api/espacios
      MS_VEHICULOS: http://vehiculos:3000/vehiculos
      TARIFA_HORA: "1.0"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_EXCHANGE: exchange_audit
      RABBITMQ_ROUTING_KEY: routing_audit
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      usuarios:
        condition: service_started
      redis:
        condition: service_healthy

  frontend:
    build: ./Frontend
    container_name: parking-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - kong

  monitoreo:
    build: ./monitoreo
    container_name: parking-monitoreo
    restart: unless-stopped
    ports:
      - "8090:80"
    depends_on:
      - kong

  ms-audit:
    build: ./ms-audit
    container_name: parking-audit
    restart: unless-stopped
    environment:
      PORT: "3004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: "123"
      DB_NAME: db_audit
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_QUEUE: queue_audit
      RABBITMQ_EXCHANGE: exchange_audit
      RABBITMQ_ROUTING_KEY: routing_audit
    ports:
      - "3004:3004"
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
  mysql_zonas_data:
  rabbitmq_data:
  redis_data:
