<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Sistema de Parqueadero</title>
    <!-- Tailwind CSS vía CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Estilos adicionales -->
    <link rel="stylesheet" href="app.css" />
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen p-6 font-sans antialiased">

    <div class="max-w-7xl mx-auto">
        <!-- Encabezado -->
        <header class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 mb-8 border border-white/20 shadow-2xl">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 p-3 rounded-xl">
                        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold text-white">Sistema de Parqueadero</h1>
                        <p class="text-purple-200 text-sm">Monitoreo en tiempo real</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="bg-white/10 backdrop-blur-sm rounded-xl px-4 py-2 border border-white/20">
                        <span id="totalEspacios" class="text-white font-semibold">Cargando...</span>
                    </div>
                    <div id="statusConexion" class="flex items-center gap-2 bg-white/10 backdrop-blur-sm rounded-xl px-4 py-2 border border-white/20">
                        <span class="w-3 h-3 rounded-full inline-block" id="indicator"></span>
                        <span id="statusText" class="text-white font-medium">Conectado</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Contenedor de tarjetas (grid) -->
        <div id="espaciosContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Las tarjetas se inyectan dinámicamente desde app.js -->
        </div>

        <!-- Pie de página con timestamp de última actualización -->
        <footer class="mt-8 text-center text-purple-200/60 text-sm">
            Última actualización: <span id="lastUpdate">--</span>
        </footer>
    </div>

    <!-- Nuestro JavaScript -->
    <script src="app.js"></script>
</body>
</html>
