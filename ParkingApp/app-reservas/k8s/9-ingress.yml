# El frontend llama a /api/auth, /api/bookings y /api/users (rutas relativas),
# pero cada backend monta sus rutas con un prefijo distinto:
#   auth-service    -> /api/...    (app.use('/api', authRoutes))
#   booking-service -> /...        (app.use('/', bookingRoutes))
#   user-service    -> /users/...  (app.use('/users', userRoutes))
# Por eso cada bloque tiene su propio rewrite-target.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservas-auth
  namespace: reservas
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservas-bookings
  namespace: reservas
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/bookings(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservas-users
  namespace: reservas
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /users/$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 5003
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reservas-frontend
  namespace: reservas
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
