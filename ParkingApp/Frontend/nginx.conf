server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida devuelve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Stream SSE de espacios: sin buffering para que los eventos lleguen al instante
    location /api/espacios/stream {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # Proxy hacia Kong (API Gateway) — mismo origen, sin CORS
    location /api/ {
        proxy_pass http://kong:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /gw/... se reescribe hacia Kong sin el prefijo (/gw/tickets -> /tickets).
    # Así las rutas del SPA (/tickets, /vehiculos) no chocan con las de la API.
    location /gw/ {
        proxy_pass http://kong:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
