sonar.projectKey=MishellCuasquer_PARKING-PIII
sonar.organization=mishellcuasquer

sonar.sources=App/ms-usuarios-roles-auth,App/ms-zonas-espacios,App/ms-vehiculos/src,App/ms-tickets/src,ms-audit/src
sonar.tests=App/ms-usuarios-roles-auth,App/ms-zonas-espacios,App/ms-vehiculos/src,App/ms-tickets/src,ms-audit/src
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/coverage/**
# El boilerplate de NestJS (specs de plantilla, eslint.config.mjs) es identico
# entre microservicios; se excluye del detector de codigo duplicado (CPD).
sonar.cpd.exclusions=**/eslint.config.mjs,**/test/**,**/*.spec.ts,**/event-publisher.service.ts,**/audit/AuditPublisher.java,**/audit/RabbitConfig.java,**/dto/**

# Codigo declarativo o de arranque sin logica: no se exige cobertura sobre
# bootstrap (main.ts), modulos, configuracion, entidades, DTOs e interfaces.
sonar.coverage.exclusions=**/main.ts,**/*.module.ts,**/config/**,**/entities/**,**/dto/**,**/interfaces/**

sonar.java.binaries=App/ms-usuarios-roles-auth/usuarios/target/classes,App/ms-zonas-espacios/zonas-espacios/target/classes
sonar.java.test.binaries=App/ms-usuarios-roles-auth/usuarios/target/test-classes,App/ms-zonas-espacios/zonas-espacios/target/test-classes
sonar.coverage.jacoco.xmlReportPaths=App/ms-usuarios-roles-auth/usuarios/target/site/jacoco/jacoco.xml,App/ms-zonas-espacios/zonas-espacios/target/site/jacoco/jacoco.xml

sonar.javascript.lcov.reportPaths=App/ms-vehiculos/coverage/lcov.info,App/ms-tickets/coverage/lcov.info,ms-audit/coverage/lcov.info
