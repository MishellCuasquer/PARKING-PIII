name: SonarCloud analysis

on:
  push:
    branches:
      - development
      - principal
      - main
      - master

  pull_request:
    branches:
      - development
      - principal
      - main
      - master

jobs:
  sonar:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123"
          POSTGRES_DB: usuarios_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: "123"
          MYSQL_DATABASE: zonas_espacios
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -uroot -p123"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            ParkingApp/package-lock.json
            ParkingApp/ms-audit/package-lock.json

      - name: Test + coverage (Java, genera jacoco.xml)
        run: mvn -f ParkingApp/pom.xml clean verify --batch-mode

      - name: Install dependencies (workspace npm raiz)
        working-directory: ParkingApp
        run: npm ci

      - name: Test + coverage (ms-vehiculos)
        working-directory: ParkingApp/App/ms-vehiculos
        run: npx jest --coverage

      - name: Test + coverage (ms-tickets)
        working-directory: ParkingApp/App/ms-tickets
        run: npx jest --coverage

      - name: Install dependencies (ms-audit)
        working-directory: ParkingApp/ms-audit
        run: npm ci

      - name: Test + coverage (ms-audit)
        working-directory: ParkingApp/ms-audit
        run: npx jest --coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        with:
          projectBaseDir: ParkingApp
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Detect changed microservices
        id: changed-services
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          CHANGED_SERVICES=""
          
          if echo "$CHANGED_FILES" | grep -q "ms-vehiculos"; then
            CHANGED_SERVICES="$CHANGED_SERVICES 🚗 ms-vehiculos"
          fi
          if echo "$CHANGED_FILES" | grep -q "ms-tickets"; then
            CHANGED_SERVICES="$CHANGED_SERVICES 🎫 ms-tickets"
          fi
          if echo "$CHANGED_FILES" | grep -q "ms-audit"; then
            CHANGED_SERVICES="$CHANGED_SERVICES 📊 ms-audit"
          fi
          if echo "$CHANGED_FILES" | grep -q "ms-zonas-espacios"; then
            CHANGED_SERVICES="$CHANGED_SERVICES 🅿️ ms-zonas-espacios"
          fi
          if echo "$CHANGED_FILES" | grep -q "ms-usuarios-roles-auth"; then
            CHANGED_SERVICES="$CHANGED_SERVICES 👤 ms-usuarios-roles-auth"
          fi
          
          if [ -z "$CHANGED_SERVICES" ]; then
            CHANGED_SERVICES="📝 Configuración/General"
          fi
          
          echo "services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT

      - name: Send Telegram Notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ EXITOSO"
          else
            STATUS="❌ FALLÓ"
          fi

          MESSAGE=$(printf '%s\n' \
            "🚀 Análisis SonarCloud ${STATUS}" \
            "" \
            "📦 Repositorio: ${{ github.repository }}" \
            "🌿 Rama: ${{ github.ref_name }}" \
            "👤 Usuario: ${{ github.actor }}" \
            "📝 Commit: ${{ github.sha }}" \
            "" \
            "🔧 Microservicios modificados:" \
            "${{ steps.changed-services.outputs.services }}" \
            "" \
            "🔗 Ver ejecución:" \
            "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}")

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE"
