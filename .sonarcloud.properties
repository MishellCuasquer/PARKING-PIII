# Configuración para el Automatic Analysis de SonarCloud (se lee desde la raíz
# del repo). Excluye el boilerplate generado por NestJS que es idéntico entre
# microservicios y dispara la métrica de duplicación (eslint.config.mjs y los
# tests e2e de plantilla), además de artefactos de build.
sonar.exclusions=**/node_modules/**,**/dist/**,**/target/**,**/coverage/**,**/eslint.config.mjs,**/test/app.e2e-spec.ts
sonar.cpd.exclusions=**/eslint.config.mjs,**/test/**,**/*.spec.ts
